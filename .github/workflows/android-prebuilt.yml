name: 'android-prebuilt'

'on':
  workflow_dispatch:
    inputs:
      android_platform:
        description: 'Android API level'
        required: true
        default: '21'
      openssl_version:
        description: 'OpenSSL version label used in output metadata'
        required: true
        default: '3.6.2'
      openssl_repository:
        description: 'OpenSSL repository to build from'
        required: true
        default: 'asmzhang/openssl'
      openssl_ref:
        description: 'OpenSSL branch or tag to build from'
        required: true
        default: 'android'

permissions:
  contents: read

env:
  CURL_VERSION: '8.20.0'
  DO_NOT_TRACK: '1'

jobs:
  build:
    name: '${{ matrix.abi }}'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.openssl_repository }}
          ref: ${{ inputs.openssl_ref }}
          persist-credentials: false
          path: openssl-src

      - name: 'set up Android NDK'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: 'install tools'
        run: sudo apt-get -o Dpkg::Use-Pty=0 update && sudo apt-get -o Dpkg::Use-Pty=0 install ninja-build

      - name: 'build OpenSSL for Android'
        shell: bash
        env:
          ABI: ${{ matrix.abi }}
          API_LEVEL: ${{ inputs.android_platform }}
        run: |
          set -euxo pipefail

          case "${ABI}" in
            arm64-v8a) OPENSSL_TARGET='android-arm64' ;;
            armeabi-v7a) OPENSSL_TARGET='android-arm' ;;
            x86) OPENSSL_TARGET='android-x86' ;;
            x86_64) OPENSSL_TARGET='android-x86_64' ;;
            *)
              echo "unsupported ABI: ${ABI}" >&2
              exit 1
              ;;
          esac

          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export PATH="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"

          rm -rf "${GITHUB_WORKSPACE}/openssl-build/${ABI}"
          mkdir -p "${GITHUB_WORKSPACE}/openssl-build/${ABI}"

          cd openssl-src
          make clean || true
          perl ./Configure \
            "${OPENSSL_TARGET}" \
            "-D__ANDROID_API__=${API_LEVEL}" \
            "no-shared" \
            "--prefix=${GITHUB_WORKSPACE}/openssl-build/${ABI}" \
            "--openssldir=${GITHUB_WORKSPACE}/openssl-build/${ABI}/ssl"
          make -j"$(nproc)"
          make install_sw
          cd "${GITHUB_WORKSPACE}"

      - name: 'build prebuilt curl'
        env:
          CURL_OPENSSL_VERSION: '${{ inputs.openssl_version }}'
        run: |
          ./.github/scripts/build-android-prebuilt.sh \
            "${{ matrix.abi }}" \
            "${{ inputs.android_platform }}" \
            "$PWD/openssl-build" \
            "${CURL_VERSION}" \
            "$PWD/out"

      - name: 'upload per-abi artifact'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: 'curl-openssl-android-${{ matrix.abi }}'
          path: |
            out/curl/${{ env.CURL_VERSION }}/${{ matrix.abi }}
            out/openssl/${{ inputs.openssl_version }}/${{ matrix.abi }}
            out/BUILD_INFO-${{ matrix.abi }}.txt
          if-no-files-found: error

  bundle:
    name: 'bundle'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 'download ABI artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: out

      - name: 'normalize package tree'
        run: |
          mkdir -p release/curl/${{ env.CURL_VERSION }}
          mkdir -p release/openssl/${{ inputs.openssl_version }}
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p "release/curl/${{ env.CURL_VERSION }}/${abi}"
            mkdir -p "release/openssl/${{ inputs.openssl_version }}/${abi}"
            cp -R "out/curl-openssl-android-${abi}/curl/${{ env.CURL_VERSION }}/${abi}/." "release/curl/${{ env.CURL_VERSION }}/${abi}/"
            cp -R "out/curl-openssl-android-${abi}/openssl/${{ inputs.openssl_version }}/${abi}/." "release/openssl/${{ inputs.openssl_version }}/${abi}/"
            cp "out/curl-openssl-android-${abi}/BUILD_INFO-${abi}.txt" "release/"
          done

      - name: 'archive'
        run: |
          cd release
          tar -czf "curl-openssl-android-prebuilt-${{ env.CURL_VERSION }}-${{ inputs.openssl_version }}-${{ inputs.openssl_ref }}.tar.gz" curl openssl BUILD_INFO-*.txt

      - name: 'upload bundle'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: 'curl-openssl-android-prebuilt-${{ env.CURL_VERSION }}'
          path: |
            release/curl
            release/openssl
            release/BUILD_INFO-*.txt
            release/curl-openssl-android-prebuilt-${{ env.CURL_VERSION }}-${{ inputs.openssl_version }}-${{ inputs.openssl_ref }}.tar.gz
          if-no-files-found: error
